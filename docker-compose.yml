services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: deligo
      POSTGRES_PASSWORD: deligo
      POSTGRES_DB: deligo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deligo -d deligo"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - deligo_net

  # ── NestJS API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      # "postgres" is the service name above — Docker resolves it internally
      DATABASE_URL: postgresql://deligo:deligo@postgres:5432/deligo
      # ⚠️  Change ALL secrets below before going to production
      JWT_ACCESS_SECRET: local-dev-access-secret-change-me-32chars!
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-me-32chars!
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGINS: http://localhost:3000
      PAYMENT_WEBHOOK_SECRET: local-dev-webhook-secret-16ch
      DEFAULT_CURRENCY: XAF
      # 64 hex chars = 32 bytes for AES-256 — change this in production
      APP_ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
    ports:
      - "4000:4000"
    networks:
      - deligo_net

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser (on your machine) calls the API through the exposed port.
        # LOCAL      → http://localhost:4000/api/v1                (keep as-is)
        # PRODUCTION → https://api.deligodelivery.com/api/v1   (change this line)
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - deligo_net

volumes:
  postgres_data:

networks:
  deligo_net:
    driver: bridge
