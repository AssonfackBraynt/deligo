name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/deligo/app && git pull && docker compose -f docker-compose.prod.yml up -d --build && docker image prune -f"
